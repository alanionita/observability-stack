apiVersion: 1

deleteDatasources:
  - name: InfluxDB_v2_Flux
    orgId: 1

prune: true

datasources:
  - name: InfluxDB_v2_Flux
    type: influxdb
    access: proxy
    url: ${INFLUX_URL}
    jsonData:
      version: Flux
      organization: ${INFLUX_ORG}
      defaultBucket: ${INFLUX_BUCKET}
      tlsSkipVerify: true
    secureJsonData:
      token: $INFLUX_TOKEN
