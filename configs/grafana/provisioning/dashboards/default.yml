apiVersion: 1

providers:
  - name: 'Prometheus' # A uniquely identifiable name for the provider
    folder: '' # The folder where to place the dashboards
    orgId: 1
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 15
    allowUiUpdates: false # Blocks UI updates to the dashboard
    options:
      path: /var/lib/grafana/dashboards