# Read metrics about docker containers
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  # Per-container metrics
  perdevice_include = [
    "cpu",
    "memory",
    "blkio",
    "network",
    "healthcheck"
  ]
  
  # Aggregate metrics
  total_include = [
    "cpu", 
    "memory",
    "blkio",
    "network"
  ]
  
  # Filter containers
  container_names = []

  container_name_include = []
  container_name_exclude = []
  container_state_include = ["running"]
  
  # Timeout
  timeout = "5s"
  
  # Docker daemon metrics
  # docker_metric_include = ["container", "image", "network", "volume"]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"] # double check the port. could be 9999 if using OSS Beta
  token = "replace_with_your_token"
  organization = "your_username"
  bucket = "replace_with_your_bucket_name"